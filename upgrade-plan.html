<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDev Upgrade Plan</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #faf9f7;
            --accent: #c94a2e;
            --accent-light: #e8dcd9;
            --muted: #6b6561;
            --line: #e0ddda;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 120px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
            opacity: 0.5;
            pointer-events: none;
        }
        .hero-content {
            max-width: 800px;
            position: relative;
            z-index: 1;
        }
        .eyebrow {
            font-family: 'DM Sans', monospace;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
        }
        h1 {
            font-family: 'Newsreader', Georgia, serif;
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
        }
        h1 .highlight {
            color: var(--accent);
            font-style: italic;
        }
        .subtitle {
            font-size: 20px;
            color: var(--muted);
            max-width: 600px;
            margin-bottom: 48px;
        }
        .meta {
            display: flex;
            gap: 32px;
            font-size: 14px;
            color: var(--muted);
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .meta-item::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }
        .section {
            padding: 120px;
            border-top: 1px solid var(--line);
        }
        .phase-header {
            display: flex;
            align-items: baseline;
            gap: 24px;
            margin-bottom: 48px;
        }
        .phase-number {
            font-family: 'Newsreader', serif;
            font-size: 72px;
            font-weight: 400;
            color: var(--accent);
            line-height: 1;
        }
        .phase-title {
            font-family: 'Newsreader', serif;
            font-size: 36px;
            font-weight: 500;
        }
        .phase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .feature-card {
            background: white;
            border: 1px solid var(--line);
            padding: 32px;
            transition: all 0.3s ease;
        }
        .feature-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .feature-title {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .feature-desc {
            color: var(--muted);
            font-size: 15px;
        }
        .backend-section {
            background: var(--ink);
            color: var(--paper);
            padding: 80px 120px;
        }
        .backend-title {
            font-family: 'Newsreader', serif;
            font-size: 32px;
            margin-bottom: 40px;
        }
        .backend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }
        .backend-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 32px;
        }
        .backend-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .backend-card p {
            color: rgba(255,255,255,0.7);
            font-size: 15px;
        }
        .backend-card .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .timeline {
            position: relative;
            padding-left: 40px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--line);
        }
        .timeline-item {
            position: relative;
            padding-bottom: 40px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -44px;
            top: 8px;
            width: 10px;
            height: 10px;
            background: var(--paper);
            border: 2px solid var(--accent);
            border-radius: 50%;
        }
        .timeline-item.completed::before {
            background: var(--accent);
        }
        .timeline-phase {
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .timeline-title {
            font-family: 'Newsreader', serif;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .timeline-desc {
            color: var(--muted);
            font-size: 15px;
        }
        footer {
            padding: 80px 120px;
            border-top: 1px solid var(--line);
            text-align: center;
        }
        footer p {
            color: var(--muted);
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .hero, .section {
                padding: 60px 24px;
            }
            .backend-section {
                padding: 60px 24px;
            }
            h1 {
                font-size: 40px;
            }
            .phase-number {
                font-size: 48px;
            }
        }
    </style>
</head>
