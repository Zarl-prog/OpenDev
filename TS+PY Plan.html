<html lang="en">
<head>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        :root {
            --ink: #1a1a1a;

            gap: 16px;

        .diagram {

        .pattern-title {

        .pattern-desc {

            border-radius: 6px;

            text-transform: uppercase;

        .benefits {

            gap: 20px;

        .benefit-item {

            gap: 16px;

        .benefit-icon {

<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <>
                    <section className="hero">
                        <div className="hero-content">
                            <div className="eyebrow">Architecture Pattern</div>
                            <h1>The <span>Hybrid</span> Architecture</h1>
                            <p className="subtitle">
                                TypeScript owns the user-facing layer — auth, UI, real-time streaming. 
                                Python owns the intelligence — LLM calls, tools, memory, embeddings.
                            </p>
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">Architecture Overview</h2>
                        <div className="diagram">
                            <div className="diagram-row">
                                <div className="diagram-box ts">
                                    <div className="label">Frontend</div>
                                    <div className="title">TypeScript Product</div>
                                    <div className="tech">Next.js / React</div>
                                </div>
                                <span className="arrow">→</span>
                                <div className="diagram-box gateway">
                                    <div className="label">API Gateway</div>
                                    <div className="title">TypeScript API</div>
                                    <div className="tech">Express / Fastify</div>
                                </div>
                                <span className="arrow">→</span>
                                <div className="diagram-box python">
                                    <div className="label">Agent Brain</div>
                                    <div className="title">Python Backend</div>
                                    <div className="tech">FastAPI + LangChain</div>
                                </div>
                            </div>
                            <div className="sub-components">
                                <div className="sub-box"><strong>Planner</strong> (LLM)</div>
                                <div className="sub-box"><strong>Memory</strong> (RAG)</div>
                                <div className="sub-box"><strong>Tools</strong> (search, code, API)</div>
                            </div>
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">Communication Patterns</h2>
                        <div className="patterns-grid">
                            <div className="pattern-card">
                                <div className="pattern-number">01</div>
                                <div className="pattern-title">REST API (Simplest)</div>
                                <div className="pattern-desc">
                                    TS sends POST request, Python processes and returns result. 
                                    Best for simple, synchronous tasks.
                                </div>
                                <div className="pattern-code">
                                    POST /agent/run {"{task: '...'}"}
                                    → {"{result: '...'}"}
                                </div>
                            </div>
                            <div className="pattern-card">
                                <div className="pattern-number">02</div>
                                <div className="pattern-title">Streaming with SSE (Best for Chat)</div>
                                <div className="pattern-desc">
                                    TS opens EventSource, Python streams tokens back in real-time.
                                    Creates smooth streaming response experience.
                                </div>
                                <div className="pattern-code">
                                    EventSource → SSE stream
                                    tokens arrive as they're generated
                                </div>
                            </div>
                            <div className="pattern-card">
                                <div className="pattern-number">03</div>
                                <div className="pattern-title">Message Queue (Best for Long Tasks)</div>
                                <div className="pattern-desc">
                                    TS pushes to Redis/RabbitMQ, Python worker picks up task,
                                    stores result, TS polls or gets webhook notification.
                                </div>
                                <div className="pattern-code">
                                    Redis + Celery → async workers
                                    webhooks for completion
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">Minimal Working Example</h2>
                        
                        <div className="code-block">
                            <span className="code-label py">Python Brain (FastAPI)</span>
                            <pre>{`# agent_brain/main.py
from fastapi import FastAPI
from fastapi.responses import StreamingResponse
import anthropic

app = FastAPI()
client = anthropic.Anthropic()

@app.post("/agent/run")
async def run_agent(payload: dict):
    task = payload["task"]
    messages = [{"role": "user", "content": task}]
    
    response = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=1000,
        messages=messages
    )
    
    return {"result": response.content[0].text}

@app.post("/agent/stream")
async def stream_agent(payload: dict):
    task = payload["task"]
    
    def generate():
        with client.messages.stream(
            model="claude-sonnet-4-20250514",
            max_tokens=1000,
            messages=[{"role": "user", "content": task}]
        ) as stream:
            for text in stream.text_stream:
                yield f"data: {text}\\n\\n"  # SSE format
    
    return StreamingResponse(generate(), media_type="text/event-stream")`}</pre>
                        </div>

                        <div className="code-block">
                            <span className="code-label ts">TypeScript Product (Next.js)</span>
                            <pre>{`// app/api/agent/route.ts
export async function POST(req: Request) {
  const { task } = await req.json()
  
  const response = await fetch("http://localhost:8000/agent/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ task })
  })
  
  const data = await response.json()
  return Response.json(data)
}

// components/AgentChat.tsx
"use client"
import { useState } from "react"

export default function AgentChat() {
  const [result, setResult] = useState("")
  const [task, setTask] = useState("")

  const runAgent = async () => {
    const eventSource = new EventSource(
      \`http://localhost:8000/agent/stream?task=\${encodeURIComponent(task)}\`
    )
    
    eventSource.onmessage = (e) => {
      setResult(prev => prev + e.data)  // tokens stream in real-time
    }
  }

  return (
    <div>
      <input value={task} onChange={e => setTask(e.target.value)} />
      <button onClick={runAgent}>Run Agent</button>
      <p>{result}</p>
    </div>
  )
}`}</pre>
                        </div>
                    </section>

                    <section className="section">
                        <h2 className="section-title">Full Production Stack</h2>
                        <table className="stack-table">
                            <thead>
                                <tr>
                                    <th>Layer</th>
                                    <th>Technology</th>
                                    <th>Language</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>UI</td>
                                    <td>Next.js / React</td>
                                    <td><span className="lang ts">TS</span></td>
                                </tr>
                                <tr>
                                    <td>API Gateway</td>
                                    <td>Express / Fastify</td>
                                    <td><span className="lang ts">TS</span></td>
                                </tr>
                                <tr>
                                    <td>Auth</td>
                                    <td>NextAuth / Clerk</td>
                                    <td><span className="lang ts">TS</span></td>
                                </tr>
                                <tr>
                                    <td>Agent Brain</td>
                                    <td>FastAPI + LangChain / LlamaIndex / CrewAI</td>
                                    <td><span className="lang py">Python</span></td>
                                </tr>
                                <tr>
                                    <td>LLM</td>
                                    <td>Claude via Anthropic SDK</td>
                                    <td><span className="lang py">Python</span></td>
                                </tr>
                                <tr>
                                    <td>Memory / RAG</td>
                                    <td>LangChain + ChromaDB</td>
                                    <td><span className="lang py">Python</span></td>
                                </tr>
                                <tr>
                                    <td>Task Queue</td>
                                    <td>Redis + Celery</td>
                                    <td><span className="lang py">Python</span></td>
                                </tr>
                                <tr>
                                    <td>Database</td>
                                    <td>PostgreSQL</td>
                                    <td><span className="lang both">Both</span></td>
                                </tr>
                                <tr>
                                    <td>Deployment</td>
                                    <td>Vercel (TS) + Docker (Python)</td>
                                    <td>—</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="section">
                        <h2 className="section-title">Key Benefits of This Split</h2>
                        <div className="benefits">
                            <div className="benefit-item">
                                <div className="benefit-icon">⚡</div>
                                <div className="benefit-text">
                                    <strong>Specialized Ownership</strong>
                                    Python owns heavy LLM calls, tools, embeddings. TypeScript owns auth, UI, real-time streaming.
                                </div>
                            </div>
                            <div className="benefit-item">
                                <div className="benefit-icon">📈</div>
                                <div className="benefit-text">
                                    <strong>Independent Scaling</strong>
                                    Each side scales independently — frontend on edge, agent brain on GPU clusters.
                                </div>
                            </div>
                            <div className="benefit-item">
                                <div className="benefit-icon">👥</div>
                                <div className="benefit-text">
                                    <strong>Team Specialization</strong>
                                    ML engineers in Python, frontend engineers in TypeScript. Clear ownership, faster shipping.
                                </div>
                            </div>
                            <div className="benefit-item">
                                <div className="benefit-icon">🔄</div>
                                <div className="benefit-text">
                                    <strong>Swappable Components</strong>
                                    Swap either side without touching the other. New LLM provider? Just update Python layer.
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer>
                        <p>Hybrid Architecture · TypeScript + Python</p>
                    </footer>
                </>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
